<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loop AI Demo Preview</title>
  <style>
    :root {
      --bg: #f7f3ff;
      --panel: rgba(255,255,255,0.92);
      --border: #d8d0f9;
      --text: #26215c;
      --muted: #6b63b5;
      --accent: #534ab7;
      --accent2: #7f77dd;
      --ok: #177a51;
      --warn: #d97706;
      --info: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #ffffff 0, #f7f3ff 35%, #f1ecff 100%);
    }
    .wrap { min-height: 100vh; padding: 24px; display: grid; place-items: center; }
    .shell {
      width: min(1480px, 100%);
      background: rgba(255,255,255,0.64);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: 0 24px 60px rgba(79, 64, 170, 0.12);
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 30px; letter-spacing: -0.04em; }
    .caption { color: var(--muted); font-size: 16px; line-height: 1.6; max-width: 820px; }
    .viewer {
      background: #fff;
      border: 1px solid #ddd5fb;
      border-radius: 22px;
      overflow: hidden;
      min-height: 780px;
      box-shadow: 0 20px 40px rgba(93, 76, 180, 0.08);
    }
    .browserTop {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      background: linear-gradient(180deg, #fff 0%, #f7f4ff 100%);
    }
    .dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #d8d0f9; }
    .url {
      flex: 1;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }
    .sceneHost { position: relative; min-height: 720px; background: linear-gradient(180deg, #fbfaff 0%, #f4f2ff 100%); }
    .scene { display: none; padding: 0; min-height: 720px; }
    .scene.active { display: block; }
    .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    button {
      border: 1px solid var(--border);
      background: #f5f1ff;
      color: #6157e7;
      border-radius: 999px;
      padding: 10px 16px;
      font: 700 14px Inter, Arial, sans-serif;
      cursor: pointer;
    }
    .label { color: #5f5887; font-size: 14px; }
    .progress { margin-top: 14px; height: 8px; background: #ece7ff; border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; width: 12.5%; background: linear-gradient(90deg, #6157e7 0%, #8d7dff 100%); transition: width .25s ease; }
    .header-nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
    }
    .tabset, .actions { display: flex; gap: 8px; align-items: center; }
    .tabset { justify-content: center; }
    .tab, .pill, .cta, .ghost {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font-family: inherit;
    }
    .tab { padding: 10px 16px; font-size: 14px; color: var(--muted); }
    .tab.active { color: var(--accent); font-weight: 700; }
    .pill { padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: var(--muted); background: #efeaff; }
    .cta, .ghost { padding: 10px 14px; font-size: 13px; font-weight: 700; }
    .cta { background: var(--accent); border-color: var(--accent); color: #fff; }
    .ghost { color: var(--text); }
    .hero { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr); gap: 22px; padding: 26px; }
    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(83, 74, 183, 0.06);
    }
    .eyebrow { display: inline-flex; align-items: center; padding: 8px 12px; border-radius: 999px; background: #efeaff; color: var(--accent); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .big { margin-top: 16px; font-size: 54px; line-height: 1; letter-spacing: -0.06em; font-weight: 800; }
    .body { margin-top: 18px; color: var(--muted); font-size: 18px; line-height: 1.7; }
    .stack { display: grid; gap: 12px; }
    .mini {
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8f6ff;
      border: 1px solid var(--border);
    }
    .mini strong { display: block; font-size: 15px; margin-bottom: 4px; }
    .mini span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .workspace { display: grid; grid-template-columns: 240px minmax(0, 1fr) 320px; min-height: 720px; }
    .sidebar { background: #ebe9fc; border-right: 1px solid var(--border); }
    .logo { padding: 22px 18px; font-size: 22px; font-weight: 800; color: var(--accent); border-bottom: 1px solid var(--border); }
    .side-head { padding: 16px 18px 10px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 800; }
    .nav-group { padding: 10px 18px; font-size: 14px; font-weight: 700; color: var(--text); background: rgba(127,119,221,0.12); border-left: 3px solid var(--accent); }
    .nav-item { padding: 8px 18px 8px 34px; font-size: 13px; color: var(--muted); }
    .nav-item.active { color: var(--accent); font-weight: 700; }
    .main { display: flex; flex-direction: column; min-width: 0; }
    .projectBar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 22px; }
    .projectRow { display: flex; justify-content: space-between; gap: 16px; align-items: center; flex-wrap: wrap; }
    .meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; color: var(--muted); font-size: 12px; }
    .status { display: inline-flex; align-items: center; padding: 8px 10px; border-radius: 999px; background: #fff7e8; color: var(--warn); font-size: 12px; font-weight: 700; }
    .status.ok { background: #eefcf4; color: var(--ok); }
    .workspaceTabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 22px; border-bottom: 1px solid var(--border); background: #f7f4ff; }
    .workspaceTab { padding: 10px 14px; border-radius: 999px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 13px; }
    .workspaceTab.active { background: #efeaff; color: var(--accent); font-weight: 800; }
    .canvas { padding: 20px 22px 24px; display: grid; gap: 16px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .tile { border: 1px solid var(--border); background: #fff; border-radius: 18px; padding: 18px; min-height: 160px; }
    .tile h3 { margin: 0 0 10px; font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; }
    .tile p, .tile li { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.65; }
    .tile ul { margin: 0; padding-left: 18px; }
    .rail { background: #fff; border-left: 1px solid var(--border); padding: 18px; display: grid; gap: 14px; }
    .railCard { border: 1px solid var(--border); border-radius: 18px; padding: 16px; background: #faf9ff; }
    .railCard h4 { margin: 0 0 8px; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; }
    .railCard p, .railCard li { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .railCard ul { margin: 0; padding-left: 18px; }
    .note { margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.7; }
    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 220px minmax(0, 1fr); }
      .rail { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--border); }
      .hero { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .grid2 { grid-template-columns: 1fr; }
      .header-nav { grid-template-columns: 1fr; }
      .tabset, .actions { justify-content: center; }
      .big { font-size: 42px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <div class="top">
        <div>
          <h1>Loop Demo: SignalDesk</h1>
          <div class="caption">Standalone autoplay demo using a realistic dummy B2B SaaS product. This mirrors the current Loop MVP flow from start project through AI-assisted narrative, assets, review, launch, and feedback reporting.</div>
        </div>
        <div class="label" id="sceneLabel"></div>
      </div>
      <div class="viewer">
        <div class="browserTop">
          <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
          <div class="url">https://loop-mvp.local/private-demo/signaldesk</div>
          <div class="pill">Private MVP</div>
        </div>
        <div class="sceneHost" id="sceneHost"></div>
      </div>
      <div class="controls">
        <button id="prevBtn">Prev</button>
        <button id="playBtn">Pause</button>
        <button id="nextBtn">Next</button>
      </div>
      <div class="progress"><div class="fill" id="fill"></div></div>
    </div>
  </div>
  <script>
    const demo = {
      product: {
        name: "SignalDesk",
        description: "An AI copilot that turns customer calls, Slack threads, and CRM notes into launch-ready market intelligence.",
        launchDate: "2026-04-22",
        version: "v1.0",
        status: "Planned"
      },
      productTruth: {
        whatProductDoes: "SignalDesk captures scattered customer and revenue signals and turns them into a shared source of truth for PMM, product, and sales teams.",
        whoItIsFor: "Series A-B B2B SaaS teams with one PMM or founder running launches across product, sales, and marketing.",
        coreProblem: "Teams launch with stale assumptions because customer insights, objections, and competitive signals are fragmented across tools and conversations.",
        impact: "That fragmentation causes weak positioning, slower review cycles, inconsistent assets, and lower confidence at launch.",
        solutionSummary: "SignalDesk centralizes customer evidence, competitive movement, and field feedback into one launch intelligence layer.",
        howItSolves: "It ingests notes from calls and workflows, clusters patterns, drafts market insights, and gives PMMs a launch-ready brief in one place."
      },
      coreNarrative: {
        positioningStatement: "For B2B SaaS teams that need a clearer way to turn market evidence into launch direction, SignalDesk is the launch intelligence workspace that converts customer signals into approved narrative and GTM outputs. Unlike scattered docs, CRM exports, and generic AI tools, SignalDesk keeps product truth, story, and post-launch learning connected in one system.",
        valueProposition: "SignalDesk helps teams launch faster with clearer proof, stronger alignment, and fewer review loops because the narrative starts from real customer evidence.",
        topMessaging: "Launch from evidence, not guesswork. Make product truth visible to every GTM stakeholder. Turn customer signals into approved launch story faster."
      },
      competition: {
        mainCompetitors: "Notion-based launch ops, Gong exports plus spreadsheets, generic AI copilots, and PMM decks in Google Slides.",
        whyWeWin: "We win by turning messy evidence into a repeatable launch workflow with review and feedback built in."
      },
      gtm: {
        launchGoal: "Win 10 design partners and establish SignalDesk as the easiest way for PMMs to launch from real customer evidence.",
        websiteMessaging: "Lead with evidence-driven launches, show how signals become narrative, and position SignalDesk as the shared workspace for PMM alignment."
      },
      assets: {
        homepageHero: "Turn customer signals into launch-ready narrative, review decisions, and GTM assets in one workflow.",
        launchEmail: "SignalDesk helps PMMs launch from real customer evidence instead of disconnected notes, decks, and prompts."
      },
      reports: {
        alignmentReport: "Alignment is strongest around the product problem and launch value, but the proof layer still needs reinforcement in both sales and website messaging.",
        narrativeHealth: "The narrative is clear and ownable, with a strong market story around evidence-driven launches. The biggest health risk is that proof and competitive framing must stay just as strong as the headline message.",
        feedbackSummary: "Early reactions suggest the workflow resonates quickly with PMMs, while founders respond most to the promise of faster decision-making.",
        nextVersionRecommendations: "Add stronger customer proof, simplify the homepage subhead, sharpen the competitive win story, and create a role-specific asset for founder-led GTM teams."
      }
    };

    const scenes = [
      {
        label: "1 / 7  Landing page and Start Project",
        render: () => `
          <section class="scene active">
            <div class="header-nav">
              <div></div>
              <div class="tabset">
                <button class="tab">Who We Are</button>
                <button class="tab active">What Is Loop</button>
                <button class="tab">Why Loop</button>
              </div>
              <div class="actions">
                <button class="ghost">Start Project</button>
                <button class="cta">Open Loop</button>
              </div>
            </div>
            <div class="hero">
              <div class="card">
                <span class="eyebrow">What Is Loop</span>
                <div class="big">Loop helps teams move from product truth to launch with one guided workflow.</div>
                <div class="body">The private MVP starts with a simple choice: open Loop or start a project immediately. No signup friction, just a direct path into the workflow.</div>
              </div>
              <div class="card">
                <div class="stack">
                  <div class="mini"><strong>Dummy product</strong><span>${demo.product.name}: ${demo.product.description}</span></div>
                  <div class="mini"><strong>Launch date</strong><span>${demo.product.launchDate} · ${demo.product.version} · ${demo.product.status}</span></div>
                  <div class="mini"><strong>Goal</strong><span>Create a believable start-to-finish Loop demo showing real outputs and reports.</span></div>
                </div>
              </div>
            </div>
          </section>`
      },
      {
        label: "2 / 7  Product Truth",
        render: () => `
          <section class="scene active">
            <div class="workspace">
              <aside class="sidebar">
                <div class="logo">LOOP</div>
                <div class="side-head">Workspace</div>
                <div class="nav-group">Product Truth</div>
                <div class="nav-item active">Product Overview</div>
                <div class="nav-item">Problem Statement</div>
                <div class="nav-item">Solution</div>
                <div class="nav-item">Audience</div>
                <div class="nav-item">Features</div>
              </aside>
              <main class="main">
                <div class="projectBar">
                  <div class="projectRow"><strong>${demo.product.name}</strong><span class="status">Workspace in Progress</span></div>
                  <div class="meta"><span>Launch Date: ${demo.product.launchDate}</span><span>Version: ${demo.product.version}</span><span>Status: ${demo.product.status}</span></div>
                </div>
                <div class="workspaceTabs">
                  <span class="workspaceTab active">Product Truth</span><span class="workspaceTab">Core Narrative</span><span class="workspaceTab">Competition</span><span class="workspaceTab">GTM</span><span class="workspaceTab">Assets</span><span class="workspaceTab">Feedback</span>
                </div>
                <div class="canvas">
                  <div class="toolbar"><button class="cta">Save Workspace</button><button class="ghost">Save Project</button></div>
                  <div class="grid2">
                    <div class="tile"><h3>What Product Does</h3><p>${demo.productTruth.whatProductDoes}</p></div>
                    <div class="tile"><h3>Who It Is For</h3><p>${demo.productTruth.whoItIsFor}</p></div>
                    <div class="tile"><h3>Core Problem</h3><p>${demo.productTruth.coreProblem}</p></div>
                    <div class="tile"><h3>Impact</h3><p>${demo.productTruth.impact}</p></div>
                  </div>
                </div>
              </main>
              <aside class="rail">
                <div class="railCard"><h4>AI Assistant</h4><ul><li>Summarize Product Truth</li><li>Sharpen Product Truth</li><li>Find risks in Product Truth</li></ul></div>
                <div class="railCard"><h4>Value</h4><p>Everything later in the workflow is grounded in these factual product inputs.</p></div>
              </aside>
            </div>
          </section>`
      },
      {
        label: "3 / 7  Core Narrative and Competition",
        render: () => `
          <section class="scene active">
            <div class="workspace">
              <aside class="sidebar">
                <div class="logo">LOOP</div>
                <div class="side-head">Workspace</div>
                <div class="nav-group">Core Narrative</div>
                <div class="nav-item active">Positioning</div>
                <div class="nav-item">Messaging Architecture</div>
                <div class="nav-item">Value</div>
                <div class="nav-group" style="margin-top:10px;">Competition</div>
                <div class="nav-item">Overview</div>
              </aside>
              <main class="main">
                <div class="projectBar">
                  <div class="projectRow"><strong>AI-generated narrative draft</strong><span class="status">Ready for refinement</span></div>
                  <div class="meta"><span>Generated from Product Truth</span><span>Competition unlocked</span></div>
                </div>
                <div class="workspaceTabs">
                  <span class="workspaceTab">Product Truth</span><span class="workspaceTab active">Core Narrative</span><span class="workspaceTab">Competition</span><span class="workspaceTab">GTM</span><span class="workspaceTab">Assets</span><span class="workspaceTab">Feedback</span>
                </div>
                <div class="canvas">
                  <div class="toolbar"><button class="cta">Generate Draft</button><button class="ghost">Save Workspace</button><button class="ghost">Sharpen Positioning</button></div>
                  <div class="grid2">
                    <div class="tile"><h3>Positioning Statement</h3><p>${demo.coreNarrative.positioningStatement}</p></div>
                    <div class="tile"><h3>Value Proposition</h3><p>${demo.coreNarrative.valueProposition}</p></div>
                    <div class="tile"><h3>Main Competitors</h3><p>${demo.competition.mainCompetitors}</p></div>
                    <div class="tile"><h3>Why We Win</h3><p>${demo.competition.whyWeWin}</p></div>
                  </div>
                </div>
              </main>
              <aside class="rail">
                <div class="railCard"><h4>AI Suggestions</h4><ul><li>Generate positioning brief</li><li>Create battlecard</li><li>Find narrative risks</li></ul></div>
                <div class="railCard"><h4>Outcome</h4><p>Loop turns product truth into a clear market story and competitive angle the team can actually use.</p></div>
              </aside>
            </div>
          </section>`
      },
      {
        label: "4 / 7  GTM and Assets",
        render: () => `
          <section class="scene active">
            <div class="workspace">
              <aside class="sidebar">
                <div class="logo">LOOP</div>
                <div class="side-head">Workspace</div>
                <div class="nav-group">GTM</div>
                <div class="nav-item active">Strategy</div>
                <div class="nav-item">Channel Plan</div>
                <div class="nav-group" style="margin-top:10px;">Assets</div>
                <div class="nav-item">Core Assets</div>
              </aside>
              <main class="main">
                <div class="projectBar">
                  <div class="projectRow"><strong>Go-to-market and launch assets</strong><span class="status ok">Launch-ready outputs forming</span></div>
                  <div class="meta"><span>${demo.gtm.launchGoal}</span></div>
                </div>
                <div class="workspaceTabs">
                  <span class="workspaceTab">Product Truth</span><span class="workspaceTab">Core Narrative</span><span class="workspaceTab">Competition</span><span class="workspaceTab active">GTM</span><span class="workspaceTab">Assets</span><span class="workspaceTab">Feedback</span>
                </div>
                <div class="canvas">
                  <div class="toolbar"><button class="cta">Generate GTM + Assets</button><button class="ghost">Save Workspace</button><button class="ghost">Generate Asset</button></div>
                  <div class="grid2">
                    <div class="tile"><h3>Launch Goal</h3><p>${demo.gtm.launchGoal}</p></div>
                    <div class="tile"><h3>Website Messaging</h3><p>${demo.gtm.websiteMessaging}</p></div>
                    <div class="tile"><h3>Homepage Hero</h3><p>${demo.assets.homepageHero}</p></div>
                    <div class="tile"><h3>Launch Email</h3><p>${demo.assets.launchEmail}</p></div>
                  </div>
                </div>
              </main>
              <aside class="rail">
                <div class="railCard"><h4>Generate Asset</h4><ul><li>Homepage hero</li><li>Launch email</li><li>Sales one-pager</li></ul></div>
                <div class="railCard"><h4>Value</h4><p>This is where Loop starts to feel like a real product because the workflow produces tangible outputs, not just notes.</p></div>
              </aside>
            </div>
          </section>`
      },
      {
        label: "5 / 7  Review and Publish",
        render: () => `
          <section class="scene active">
            <div class="workspace">
              <aside class="sidebar">
                <div class="logo">LOOP</div>
                <div class="side-head">Workspace</div>
                <div class="nav-group">Feedback</div>
                <div class="nav-item">Analytics</div>
                <div class="nav-item active">Review Center</div>
                <div class="nav-item">Confidence</div>
              </aside>
              <main class="main">
                <div class="projectBar">
                  <div class="projectRow"><strong>Project-level review center</strong><span class="status">Owner review decision needed</span></div>
                  <div class="meta"><span>Send Project for Review</span><span>Mark Review Not Needed</span><span>Publish Version</span></div>
                </div>
                <div class="canvas">
                  <div class="toolbar"><button class="ghost">Send Project for Review</button><button class="ghost">Mark Review Not Needed</button><button class="cta">Publish Version</button></div>
                  <div class="grid2">
                    <div class="tile"><h3>Alignment Report</h3><p>${demo.reports.alignmentReport}</p></div>
                    <div class="tile"><h3>Narrative Risks</h3><ul><li>Proof needs reinforcement</li><li>Competitive framing should be tighter</li><li>Website message needs clearer ROI</li></ul></div>
                  </div>
                  <div class="note">For the MVP, review is intentionally project-level so the PMM or founder can make one clear launch decision instead of routing every section separately.</div>
                </div>
              </main>
              <aside class="rail">
                <div class="railCard"><h4>Review actions</h4><ul><li>Validate</li><li>Flag</li><li>Comment</li><li>Suggest Change</li></ul></div>
                <div class="railCard"><h4>Next step</h4><p>Once the owner is comfortable, the project is published as a version and marked ready to launch.</p></div>
              </aside>
            </div>
          </section>`
      },
      {
        label: "6 / 7  Launch and Feedback",
        render: () => `
          <section class="scene active">
            <div class="workspace">
              <aside class="sidebar">
                <div class="logo">LOOP</div>
                <div class="side-head">Workspace</div>
                <div class="nav-group">Feedback</div>
                <div class="nav-item active">Analytics</div>
                <div class="nav-item">Review Center</div>
              </aside>
              <main class="main">
                <div class="projectBar">
                  <div class="projectRow"><strong>Launch live and feedback intake</strong><span class="status ok">Product live</span></div>
                  <div class="meta"><span>Published version</span><span>Launch complete</span><span>Feedback cycle active</span></div>
                </div>
                <div class="canvas">
                  <div class="toolbar"><button class="cta">Mark Launch Live</button><button class="ghost">Add Feedback</button><button class="ghost">Generate Feedback Report</button></div>
                  <div class="grid2">
                    <div class="tile"><h3>Feedback Summary</h3><p>${demo.reports.feedbackSummary}</p></div>
                    <div class="tile"><h3>Next Version Recommendations</h3><p>${demo.reports.nextVersionRecommendations}</p></div>
                  </div>
                </div>
              </main>
              <aside class="rail">
                <div class="railCard"><h4>Loop closes here</h4><p>Post-launch signals become the input for the next version instead of staying trapped in separate notes and calls.</p></div>
              </aside>
            </div>
          </section>`
      },
      {
        label: "7 / 7  AI narrative health report",
        render: () => `
          <section class="scene active">
            <div class="workspace">
              <aside class="sidebar">
                <div class="logo">LOOP</div>
                <div class="side-head">Workspace</div>
                <div class="nav-group">Feedback</div>
                <div class="nav-item">Analytics</div>
                <div class="nav-item active">Confidence</div>
              </aside>
              <main class="main">
                <div class="projectBar">
                  <div class="projectRow"><strong>AI-generated narrative health report</strong><span class="status ok">Feedback captured</span></div>
                  <div class="meta"><span>Narrative health</span><span>Alignment report</span><span>Next-version recommendations</span></div>
                </div>
                <div class="canvas">
                  <div class="toolbar"><button class="cta">Generate Narrative Health Report</button><button class="ghost">Create Next Version</button></div>
                  <div class="grid2">
                    <div class="tile"><h3>Narrative Health</h3><p>${demo.reports.narrativeHealth}</p></div>
                    <div class="tile"><h3>Alignment Report</h3><p>${demo.reports.alignmentReport}</p></div>
                    <div class="tile"><h3>Key Messaging</h3><p>${demo.coreNarrative.topMessaging}</p></div>
                    <div class="tile"><h3>Next Best Move</h3><p>${demo.reports.nextVersionRecommendations}</p></div>
                  </div>
                </div>
              </main>
              <aside class="rail">
                <div class="railCard"><h4>Real MVP outcome</h4><p>The team starts a project, builds the narrative, generates assets, publishes a version, captures feedback, and ends with a concrete AI-backed report on what to improve next.</p></div>
              </aside>
            </div>
          </section>`
      }
    ];

    const host = document.getElementById("sceneHost");
    const fill = document.getElementById("fill");
    const label = document.getElementById("sceneLabel");
    const playBtn = document.getElementById("playBtn");
    let index = 0;
    let playing = true;
    let timer = null;

    function render() {
      host.innerHTML = scenes[index].render();
      label.textContent = scenes[index].label;
      fill.style.width = ((index + 1) / scenes.length) * 100 + "%";
    }

    function next() {
      index = (index + 1) % scenes.length;
      render();
    }

    function prev() {
      index = (index - 1 + scenes.length) % scenes.length;
      render();
    }

    function start() {
      clearInterval(timer);
      timer = setInterval(next, 3400);
    }

    document.getElementById("nextBtn").addEventListener("click", () => { next(); if (playing) start(); });
    document.getElementById("prevBtn").addEventListener("click", () => { prev(); if (playing) start(); });
    playBtn.addEventListener("click", () => {
      playing = !playing;
      playBtn.textContent = playing ? "Pause" : "Play";
      if (playing) start();
      else clearInterval(timer);
    });

    render();
    start();
  </script>
</body>
</html>
