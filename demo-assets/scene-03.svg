  <text x="300" y="348" class="eyebrow">SCENE 3</text>
  <text x="300" y="390" class="title"><tspan x="300" dy="0">Loop turns raw Product Truth into an approved</tspan><tspan x="300" dy="48">narrative</tspan></text>
  <text x="300" y="500" class="subtitle"><tspan x="300" dy="0">Once the product inputs are clear, the customer moves into Core Narrative to define</tspan><tspan x="300" dy="28">positioning, value proposition, messaging pillars, headline, and pitch.</tspan></text>

  <rect x="1184" y="348" width="162" height="40" rx="20" fill="#7b5cf0" opacity="0.16"/>
  <text x="1212" y="374" class="eyebrow" style="letter-spacing: 0.04em;">CORE NARRATIVE</text>

  
        <rect x="72" y="320" width="372" height="148" rx="26" fill="#ffffff" stroke="#d8d0f9" />
        <text x="98" y="362" class="card-title"><tspan x="98" dy="0">Positioning</tspan></text>
        <text x="98" y="398" class="card-body"><tspan x="98" dy="0">Refine the market-facing statement</tspan><tspan x="98" dy="18">instead of repeating a feature list.</tspan></text>
      
        <rect x="468" y="320" width="372" height="148" rx="26" fill="#ffffff" stroke="#d8d0f9" />
        <text x="494" y="362" class="card-title"><tspan x="494" dy="0">Value Proposition</tspan></text>
        <text x="494" y="398" class="card-body"><tspan x="494" dy="0">Distill the core promise into business</tspan><tspan x="494" dy="18">value and customer outcomes.</tspan></text>
      
        <rect x="864" y="320" width="372" height="148" rx="26" fill="#ffffff" stroke="#d8d0f9" />
        <text x="890" y="362" class="card-title"><tspan x="890" dy="0">Messaging Pillars</tspan></text>
        <text x="890" y="398" class="card-body"><tspan x="890" dy="0">Three to four repeatable messages become</tspan><tspan x="890" dy="18">the narrative spine.</tspan></text>
      
        <rect x="72" y="492" width="372" height="148" rx="26" fill="#ffffff" stroke="#d8d0f9" />
        <text x="98" y="534" class="card-title"><tspan x="98" dy="0">AI Suggestions</tspan></text>
        <text x="98" y="570" class="card-body"><tspan x="98" dy="0">Loop suggests stronger phrasing and</tspan><tspan x="98" dy="18">section-aware improvements.</tspan></text>
      

  <rect x="1126" y="596" width="246" height="160" rx="26" fill="#ffffff" stroke="#d8d0f9"/>
  <text x="1152" y="632" class="note-title">Why this matters</text>
  <text x="1152" y="666" class="note-copy"><tspan x="1152" dy="0">AI works best here as a section-aware narrative assistant, not a generic</tspan><tspan x="1152" dy="24">chatbot.</tspan></text>

