  <text x="765" y="596" fill="#1F1B5B" font-family="Arial, sans-serif" font-size="30" font-weight="700">Critical Signals</text>
  <text x="765" y="640" fill="#6E68A6" font-family="Arial, sans-serif" font-size="22">What landed: family archive, private storytelling, cultural continuity.</text>
  <text x="765" y="676" fill="#6E68A6" font-family="Arial, sans-serif" font-size="22">Risk: narrative trust proof is weaker than emotional resonance.</text>
  <text x="765" y="712" fill="#6E68A6" font-family="Arial, sans-serif" font-size="22">Action: strengthen credibility and onboarding clarity before launch.</text>

