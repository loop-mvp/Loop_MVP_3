  <text x="145" y="596" fill="#1F1B5B" font-family="Arial, sans-serif" font-size="30" font-weight="700">Executive Summary</text>
  <text x="145" y="640" fill="#6E68A6" font-family="Arial, sans-serif" font-size="22">Neem Kosh is shaping a strong emotional narrative around legacy preservation.</text>
  <text x="145" y="676" fill="#6E68A6" font-family="Arial, sans-serif" font-size="22">The story is differentiated from generic file storage, but trust proof should be stronger.</text>
  <text x="145" y="712" fill="#6E68A6" font-family="Arial, sans-serif" font-size="22">The product can progress as the next version inside the same project; drift is still low.</text>

