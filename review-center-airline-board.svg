  <text x="426" y="592" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">Neem Kosh positions neem-wood lids as the cleaner, more premium hospitality choice.</text>
  <text x="406" y="644" fill="#4D46B5" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.1">SUGGEST IMPROVEMENT / COMMENT</text>
