  <text x="392" y="234" fill="#29236A" font-family="Arial, sans-serif" font-size="30" font-weight="700">One dashboard for review, approval, analytics, and feedback management</text>
  <text x="392" y="260" fill="#6B6691" font-family="Arial, sans-serif" font-size="15">Notifications are sent by email. In Loop, Feedback shows a badge when review is submitted or received.</text>

