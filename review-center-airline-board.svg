  <text x="714" y="426" fill="#4D46B5" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.1">TEAM</text>
  <text x="822" y="426" fill="#4D46B5" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.1">CLARITY</text>
  <text x="918" y="426" fill="#4D46B5" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.1">RELEVANCE</text>
  <text x="1030" y="426" fill="#4D46B5" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.1">DIFFERENTIATION</text>
