  <text x="1320" y="478" fill="#29236A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Top Issues</text>
  <text x="1320" y="512" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">• weak differentiation</text>
  <text x="1320" y="536" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">• value lacks proof</text>
  <text x="1320" y="566" fill="#6B6691" font-family="Arial, sans-serif" font-size="13">Confidence stays tied to review data.</text>

