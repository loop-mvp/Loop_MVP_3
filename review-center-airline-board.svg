  <text x="724" y="780" fill="#3E386F" font-family="Arial, sans-serif" font-size="14" font-weight="700">PMM</text>
  <text x="840" y="780" fill="#3E386F" font-family="Arial, sans-serif" font-size="14" font-weight="700">8</text>
  <text x="940" y="780" fill="#3E386F" font-family="Arial, sans-serif" font-size="14" font-weight="700">7</text>
