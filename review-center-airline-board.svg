  <text x="1320" y="664" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">Email sent to Sales reviewers</text>
  <text x="1320" y="690" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">Feedback badge updates in Loop</text>

  <rect x="1296" y="740" width="232" height="100" rx="20" fill="#FFFFFF" stroke="#DED8FF" stroke-width="2"/>
  <text x="1320" y="770" fill="#29236A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Download Report</text>
  <text x="1320" y="804" fill="#6B6691" font-family="Arial, sans-serif" font-size="14">Sender manages exports and review progress from this same screen.</text>
