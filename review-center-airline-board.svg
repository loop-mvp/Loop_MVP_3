  <text x="1216" y="780" fill="#3E386F" font-family="Arial, sans-serif" font-size="14" font-weight="700">8</text>
  <text x="1314" y="780" fill="#3E386F" font-family="Arial, sans-serif" font-size="14" font-weight="700">7.5</text>
