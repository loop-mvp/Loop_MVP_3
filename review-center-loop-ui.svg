  <text x="1320" y="238" fill="#29236A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Top Issues</text>
  <text x="1320" y="276" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">• weak differentiation vs generic lids</text>
  <text x="1320" y="302" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">• value claim needs proof</text>
  <text x="1320" y="338" fill="#6B6691" font-family="Arial, sans-serif" font-size="13">Weakest: Differentiation</text>

  <rect x="1296" y="392" width="232" height="180" rx="20" fill="#FFFFFF" stroke="#DED8FF" stroke-width="2"/>
  <text x="1320" y="422" fill="#29236A" font-family="Arial, sans-serif" font-size="18" font-weight="700">PMM Action Queue</text>
