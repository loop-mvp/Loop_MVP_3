  <text x="1320" y="480" fill="#6B6691" font-family="Arial, sans-serif" font-size="13">Clarify why neem is meaningfully better.</text>
  <text x="1320" y="520" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">Value Proposition</text>
  <text x="1320" y="542" fill="#6B6691" font-family="Arial, sans-serif" font-size="13">Add stronger proof of guest and hygiene impact.</text>

