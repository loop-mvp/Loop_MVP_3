  <rect x="402" y="664" width="778" height="56" rx="16" fill="#FFFFFF" stroke="#DED8FF" stroke-width="2"/>
  <text x="424" y="699" fill="#3E386F" font-family="Arial, sans-serif" font-size="14">Neem Kosh positions neem-wood lids as the cleaner, more premium choice for in-room hospitality snacks.</text>
