  <text x="424" y="803" fill="#6B6691" font-family="Arial, sans-serif" font-size="14">Feels premium, but needs stronger contrast against generic plastic or single-use alternatives.</text>
  <rect x="402" y="846" width="132" height="44" rx="14" fill="#F3F0FF" stroke="#D9D2FF" stroke-width="2"/>
  <text x="442" y="874" fill="#4D46B5" font-family="Arial, sans-serif" font-size="15" font-weight="700">Improve</text>
