<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="760" fill="#F7F5FF"/>
  <text x="72" y="78" fill="#29236A" font-family="Arial, sans-serif" font-size="34" font-weight="700">Current Loop Workflow</text>
  <text x="72" y="112" fill="#6B6691" font-family="Arial, sans-serif" font-size="18">Functionally strong, but split across more screens and decisions.</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="150" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="97" y="187" fill="#4D46B5" font-size="15" font-weight="700">1. Product Input</text>
    <text x="97" y="212" fill="#3E386F" font-size="14">Name, description,</text>
    <text x="97" y="231" fill="#3E386F" font-size="14">audience, wow factor</text>

    <rect x="290" y="150" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="316" y="187" fill="#4D46B5" font-size="15" font-weight="700">2. AI Context Review</text>
    <text x="316" y="212" fill="#3E386F" font-size="14">Separate confirm step</text>
    <text x="316" y="231" fill="#3E386F" font-size="14">before workspace</text>

    <rect x="510" y="150" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="548" y="187" fill="#4D46B5" font-size="15" font-weight="700">3. Generate Draft</text>
    <text x="548" y="212" fill="#3E386F" font-size="14">Overlay while AI builds</text>
    <text x="548" y="231" fill="#3E386F" font-size="14">core sections</text>

    <rect x="730" y="150" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="757" y="187" fill="#4D46B5" font-size="15" font-weight="700">4. Product Truth</text>
    <text x="757" y="212" fill="#3E386F" font-size="14">Edit and save</text>
    <text x="757" y="231" fill="#3E386F" font-size="14">workspace</text>

    <rect x="950" y="150" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="970" y="187" fill="#4D46B5" font-size="15" font-weight="700">5. Core Narrative</text>
    <text x="970" y="212" fill="#3E386F" font-size="14">Edit and save</text>
    <text x="970" y="231" fill="#3E386F" font-size="14">workspace</text>

    <rect x="1170" y="150" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="1228" y="187" fill="#4D46B5" font-size="15" font-weight="700">6. GTM</text>
    <text x="1197" y="212" fill="#3E386F" font-size="14">Edit and save</text>
    <text x="1197" y="231" fill="#3E386F" font-size="14">workspace</text>

    <rect x="180" y="322" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="237" y="359" fill="#4D46B5" font-size="15" font-weight="700">7. Assets</text>
    <text x="208" y="384" fill="#3E386F" font-size="14">Review starter assets</text>

    <rect x="400" y="322" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="430" y="359" fill="#4D46B5" font-size="15" font-weight="700">8. Feedback Page</text>
    <text x="430" y="384" fill="#3E386F" font-size="14">Separate entry into</text>
    <text x="430" y="403" fill="#3E386F" font-size="14">review flow</text>

    <rect x="620" y="322" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="644" y="359" fill="#4D46B5" font-size="15" font-weight="700">9. Review Routing</text>
    <text x="644" y="384" fill="#3E386F" font-size="14">Assign sections to</text>
    <text x="644" y="403" fill="#3E386F" font-size="14">Sales / Product / PMM</text>

    <rect x="840" y="322" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="864" y="359" fill="#4D46B5" font-size="15" font-weight="700">10. Review Center</text>
    <text x="864" y="384" fill="#3E386F" font-size="14">Score, comment,</text>
    <text x="864" y="403" fill="#3E386F" font-size="14">Improve / Approve</text>

    <rect x="1060" y="322" width="170" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="1086" y="359" fill="#4D46B5" font-size="15" font-weight="700">11. AI Intelligence</text>
    <text x="1086" y="384" fill="#3E386F" font-size="14">Signals, patterns,</text>
    <text x="1086" y="403" fill="#3E386F" font-size="14">suggestions, confidence</text>

    <rect x="290" y="494" width="190" height="92" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="320" y="533" fill="#4D46B5" font-size="15" font-weight="700">12. PMM Actions</text>
    <text x="320" y="558" fill="#3E386F" font-size="14">Improve sections enter</text>
    <text x="320" y="577" fill="#3E386F" font-size="14">the PMM action queue</text>

    <rect x="540" y="494" width="190" height="92" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="565" y="533" fill="#4D46B5" font-size="15" font-weight="700">13. Save + Report</text>
    <text x="565" y="558" fill="#3E386F" font-size="14">Sync to Supabase and</text>
    <text x="565" y="577" fill="#3E386F" font-size="14">download report</text>

    <rect x="790" y="494" width="190" height="92" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-width="2"/>
    <text x="812" y="533" fill="#4D46B5" font-size="15" font-weight="700">14. Next Version</text>
    <text x="812" y="558" fill="#3E386F" font-size="14">Hub creates next cycle</text>
    <text x="812" y="577" fill="#3E386F" font-size="14">from prior signal</text>
  </g>

  <g stroke="#8B82E6" stroke-width="3" stroke-linecap="round">
    <path d="M240 192H290"/>
    <path d="M460 192H510"/>
    <path d="M680 192H730"/>
    <path d="M900 192H950"/>
    <path d="M1120 192H1170"/>
    <path d="M1255 234V278H264V322"/>
    <path d="M350 364H400"/>
    <path d="M570 364H620"/>
    <path d="M790 364H840"/>
    <path d="M1010 364H1060"/>
    <path d="M1145 406V450H385V494"/>
    <path d="M480 540H540"/>
    <path d="M730 540H790"/>
  </g>
</svg>
