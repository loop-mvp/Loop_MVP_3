<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="980" fill="#F8F7FF"/>
  <rect x="24" y="22" width="1392" height="92" rx="28" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="60" y="64" fill="#2C286E" font-family="Arial, sans-serif" font-size="30" font-weight="700">Review Routing</text>
  <text x="60" y="92" fill="#7A74AE" font-family="Arial, sans-serif" font-size="14">Opened after “Submit for Review”. AI suggests routing first, then the user adjusts sections before sending.</text>
  <rect x="1138" y="46" width="236" height="44" rx="16" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="1186" y="73" fill="#5A55C7" font-family="Arial, sans-serif" font-size="14" font-weight="700">AI Assign Sections</text>

  <rect x="24" y="132" width="410" height="816" rx="28" fill="#F2F0FF" stroke="#D8D2FF"/>
  <text x="58" y="176" fill="#2C286E" font-family="Arial, sans-serif" font-size="24" font-weight="700">Section Library</text>
  <text x="58" y="200" fill="#7A74AE" font-family="Arial, sans-serif" font-size="13">All sections stay visible here at all times. Users can drag from the library into any team tab.</text>

  <rect x="58" y="224" width="342" height="46" rx="16" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="82" y="252" fill="#9B96C6" font-family="Arial, sans-serif" font-size="13">Search sections</text>

  <rect x="58" y="290" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="314" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">PRODUCT TRUTH</text>
  <text x="84" y="336" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Problem</text>

  <rect x="58" y="358" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="382" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">PRODUCT TRUTH</text>
  <text x="84" y="404" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Solution</text>

  <rect x="58" y="426" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="450" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">PRODUCT TRUTH</text>
  <text x="84" y="472" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Primary Audience</text>

  <rect x="58" y="494" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="518" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">CORE NARRATIVE</text>
  <text x="84" y="540" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Positioning Statement</text>

  <rect x="58" y="562" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="586" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">CORE NARRATIVE</text>
  <text x="84" y="608" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Messaging</text>

  <rect x="58" y="630" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="654" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">CORE NARRATIVE</text>
  <text x="84" y="676" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Value Proposition</text>

  <rect x="58" y="698" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="722" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">GTM</text>
  <text x="84" y="744" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">GTM Strategy</text>

  <rect x="58" y="766" width="342" height="56" rx="18" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="84" y="790" fill="#5A55C7" font-family="Arial, sans-serif" font-size="11" font-weight="700">GTM</text>
  <text x="84" y="812" fill="#2C286E" font-family="Arial, sans-serif" font-size="15" font-weight="700">Key Channels</text>

  <rect x="452" y="132" width="964" height="816" rx="28" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="486" y="176" fill="#2C286E" font-family="Arial, sans-serif" font-size="24" font-weight="700">Review Tabs</text>
  <text x="486" y="200" fill="#7A74AE" font-family="Arial, sans-serif" font-size="13">Tabs behave like always-visible routing lanes. User can drag sections in, remove them, or rely on AI Assign first.</text>

  <rect x="486" y="226" width="110" height="42" rx="16" fill="#5A55C7"/>
  <text x="523" y="253" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="700">Sales</text>
  <rect x="606" y="226" width="120" height="42" rx="16" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="646" y="253" fill="#5A55C7" font-family="Arial, sans-serif" font-size="14" font-weight="700">Product</text>
  <rect x="736" y="226" width="100" height="42" rx="16" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="772" y="253" fill="#5A55C7" font-family="Arial, sans-serif" font-size="14" font-weight="700">PMM</text>
  <rect x="1086" y="226" width="292" height="42" rx="16" fill="#F3F0FF" stroke="#D8D2FF"/>
  <text x="1118" y="253" fill="#5A55C7" font-family="Arial, sans-serif" font-size="13" font-weight="700">For MVP: same user reviews on behalf of all teams</text>

  <rect x="486" y="292" width="892" height="586" rx="24" fill="#FBFAFF" stroke="#D8D2FF"/>
  <text x="520" y="336" fill="#2C286E" font-family="Arial, sans-serif" font-size="22" font-weight="700">Sales Review Queue</text>
  <text x="520" y="360" fill="#7A74AE" font-family="Arial, sans-serif" font-size="13">AI-assigned sections appear here first. User can drag in more sections from the library if needed.</text>

  <rect x="520" y="390" width="394" height="88" rx="20" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="548" y="420" fill="#2C286E" font-family="Arial, sans-serif" font-size="16" font-weight="700">Positioning Statement</text>
  <text x="548" y="446" fill="#7A74AE" font-family="Arial, sans-serif" font-size="12">AI reason: buyer-facing clarity and objection handling</text>
  <rect x="792" y="408" width="92" height="32" rx="12" fill="#F3F0FF" stroke="#D8D2FF"/>
  <text x="818" y="428" fill="#5A55C7" font-family="Arial, sans-serif" font-size="12" font-weight="700">Assigned</text>

  <rect x="520" y="494" width="394" height="88" rx="20" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="548" y="524" fill="#2C286E" font-family="Arial, sans-serif" font-size="16" font-weight="700">Messaging</text>
  <text x="548" y="550" fill="#7A74AE" font-family="Arial, sans-serif" font-size="12">AI reason: pitch language and review from sales lens</text>
  <rect x="792" y="512" width="92" height="32" rx="12" fill="#F3F0FF" stroke="#D8D2FF"/>
  <text x="818" y="532" fill="#5A55C7" font-family="Arial, sans-serif" font-size="12" font-weight="700">Assigned</text>

  <rect x="520" y="598" width="394" height="88" rx="20" fill="#FFFFFF" stroke="#D8D2FF" stroke-dasharray="6 6"/>
  <text x="548" y="644" fill="#9B96C6" font-family="Arial, sans-serif" font-size="13">Drag any additional section here</text>

  <rect x="942" y="390" width="404" height="296" rx="20" fill="#FFFFFF" stroke="#D8D2FF"/>
  <text x="970" y="420" fill="#5A55C7" font-family="Arial, sans-serif" font-size="12" font-weight="700">HOW THIS WORKS IN MVP</text>
  <text x="970" y="456" fill="#2C286E" font-family="Arial, sans-serif" font-size="14">1. User clicks “Submit for Review” inside Loop</text>
  <text x="970" y="484" fill="#2C286E" font-family="Arial, sans-serif" font-size="14">2. This routing page opens with all sections from all workspaces</text>
  <text x="970" y="512" fill="#2C286E" font-family="Arial, sans-serif" font-size="14">3. User clicks “AI Assign Sections” or drags rows manually</text>
  <text x="970" y="540" fill="#2C286E" font-family="Arial, sans-serif" font-size="14">4. User finalizes the review lanes</text>
  <text x="970" y="568" fill="#2C286E" font-family="Arial, sans-serif" font-size="14">5. User clicks Send</text>
  <text x="970" y="596" fill="#2C286E" font-family="Arial, sans-serif" font-size="14">6. In MVP, the same user reviews on behalf of all teams</text>

  <rect x="942" y="708" width="404" height="56" rx="18" fill="#5A55C7"/>
  <text x="1074" y="743" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">Send Review Links</text>

  <text x="942" y="800" fill="#7A74AE" font-family="Arial, sans-serif" font-size="13">Later this can send real links to reviewers. For MVP, it can open the team review flow for the same user.</text>
</svg>
