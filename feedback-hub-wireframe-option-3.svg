  <text x="1132" y="818" fill="#5B55C8" font-family="Arial, sans-serif" font-size="12" font-weight="700">AI SUGGESTION</text>
  <text x="1132" y="850" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14">Add a direct contrast statement between neem lids and commodity alternatives.</text>
