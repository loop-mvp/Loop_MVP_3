  <text x="860" y="294" fill="#8C88B7" font-family="Arial, sans-serif" font-size="12">Read-only content</text>
  <text x="860" y="322" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14">Neem Kosh positions neem-wood lids as the cleaner, more premium hospitality choice for preserving in-room snacks.</text>
