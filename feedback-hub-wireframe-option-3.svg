  <text x="840" y="718" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14">Weakest parameter: differentiation</text>
  <text x="840" y="742" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">Cross-section pattern suggests the story is clear but not yet distinct enough.</text>

