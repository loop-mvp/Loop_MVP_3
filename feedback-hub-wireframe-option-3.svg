  <text x="840" y="504" fill="#8C88B7" font-family="Arial, sans-serif" font-size="12">Comment</text>
  <text x="840" y="532" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">This section feels premium, but it needs a sharper contrast against generic plastic or single-use alternatives.</text>

