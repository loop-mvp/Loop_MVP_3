  <text x="64" y="176" fill="#2D2A72" font-family="Arial, sans-serif" font-size="24" font-weight="700">Review Matrix</text>
  <text x="64" y="198" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="14">The table stays dense and scannable; detail opens to the right instead of growing downward.</text>

