  <rect x="28" y="28" width="1384" height="86" rx="24" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="58" y="70" fill="#2D2A72" font-family="Arial, sans-serif" font-size="30" font-weight="700">Feedback Hub</text>
  <text x="58" y="95" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="14">Review narrative sections, convert feedback into signals, and act on the strongest AI patterns.</text>
  <rect x="1156" y="48" width="208" height="42" rx="14" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="1178" y="74" fill="#5B55C8" font-family="Arial, sans-serif" font-size="14" font-weight="700">Reviewer: Sales</text>

  <rect x="28" y="132" width="910" height="800" rx="28" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="58" y="176" fill="#2D2A72" font-family="Arial, sans-serif" font-size="24" font-weight="700">Review Board</text>
  <text x="58" y="200" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="14">Compact rows on top. Expanded review drawer anchored directly beneath the active section.</text>

  <rect x="58" y="228" width="850" height="52" rx="16" fill="#F7F6FF" stroke="#D9D4FF"/>
  <text x="80" y="259" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Section</text>
