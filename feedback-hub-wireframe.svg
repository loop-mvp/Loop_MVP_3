<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="980" fill="#F7F6FF"/>
  <rect x="32" y="28" width="1376" height="80" rx="24" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="68" y="76" fill="#2D2A72" font-family="Arial, sans-serif" font-size="28" font-weight="700">Feedback Hub</text>
  <text x="68" y="98" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="14">Feedback → Signals → Intelligence → Action</text>
  <rect x="1128" y="46" width="232" height="42" rx="14" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="1152" y="72" fill="#5B55C8" font-family="Arial, sans-serif" font-size="14" font-weight="700">Reviewer: Sales</text>

  <rect x="32" y="132" width="932" height="788" rx="28" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="64" y="176" fill="#2D2A72" font-family="Arial, sans-serif" font-size="24" font-weight="700">Structured Review Table</text>
  <text x="64" y="200" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="14">Each row is a narrative section. Expand to inspect content, score it, and leave section-level feedback.</text>

  <rect x="64" y="228" width="868" height="54" rx="16" fill="#F7F6FF" stroke="#D9D4FF"/>
  <text x="86" y="261" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Section</text>
