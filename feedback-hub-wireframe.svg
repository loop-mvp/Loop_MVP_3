  <text x="562" y="332" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">6</text>
  <rect x="686" y="311" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="716" y="332" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">5</text>
  <rect x="826" y="309" width="92" height="36" rx="18" fill="#FFF5E8" stroke="#F2D8A7"/>
  <text x="844" y="332" fill="#A46812" font-family="Arial, sans-serif" font-size="13" font-weight="700">In Review</text>

  <rect x="64" y="374" width="868" height="248" rx="22" fill="#FBFAFF" stroke="#D9D4FF"/>
  <text x="90" y="412" fill="#5B55C8" font-family="Arial, sans-serif" font-size="12" font-weight="700">EXPANDED SECTION</text>
  <text x="90" y="442" fill="#2D2A72" font-family="Arial, sans-serif" font-size="20" font-weight="700">Positioning</text>
  <rect x="90" y="462" width="816" height="78" rx="16" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="110" y="492" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">Read-only section content appears here so reviewers score the actual narrative,</text>
  <text x="110" y="514" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">not a summary. This keeps the review grounded in the text Loop generated.</text>

  <rect x="90" y="560" width="116" height="42" rx="12" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="110" y="586" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Clarity: 7</text>
  <rect x="222" y="560" width="128" height="42" rx="12" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="244" y="586" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Relevance: 6</text>
  <rect x="366" y="560" width="168" height="42" rx="12" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="388" y="586" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Differentiation: 5</text>
  <rect x="762" y="560" width="144" height="42" rx="21" fill="#ECFDF3" stroke="#BFE9CF"/>
  <text x="795" y="586" fill="#177A51" font-family="Arial, sans-serif" font-size="13" font-weight="700">Approved</text>

  <rect x="90" y="622" width="816" height="86" rx="16" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="110" y="652" fill="#8C88B7" font-family="Arial, sans-serif" font-size="13">Reviewer comment</text>
  <text x="110" y="679" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">Positioning is clear, but the differentiation is not strong enough versus common eco-friendly storage products.</text>

  <rect x="706" y="724" width="200" height="44" rx="14" fill="#5B55C8"/>
  <text x="748" y="752" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="700">Improve Suggestion</text>

