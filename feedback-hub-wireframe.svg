  <text x="86" y="681" fill="#2D2A72" font-family="Arial, sans-serif" font-size="16" font-weight="700">Messaging</text>
  <rect x="400" y="659" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="430" y="680" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">8</text>
  <rect x="532" y="659" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="562" y="680" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">7</text>
  <rect x="686" y="659" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="716" y="680" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">6</text>
  <rect x="826" y="657" width="92" height="36" rx="18" fill="#ECFDF3" stroke="#BFE9CF"/>
  <text x="848" y="680" fill="#177A51" font-family="Arial, sans-serif" font-size="13" font-weight="700">Approved</text>

  <rect x="64" y="720" width="868" height="62" rx="18" fill="#FFFFFF" stroke="#D9D4FF" opacity="0.65"/>
  <text x="86" y="757" fill="#2D2A72" font-family="Arial, sans-serif" font-size="16" font-weight="700">Value Proposition</text>
  <rect x="400" y="735" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="430" y="756" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">6</text>
  <rect x="532" y="735" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="562" y="756" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">7</text>
  <rect x="686" y="735" width="74" height="32" rx="10" fill="#F3F0FF" stroke="#D9D4FF"/>
  <text x="716" y="756" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14" font-weight="700">4</text>
  <rect x="826" y="733" width="92" height="36" rx="18" fill="#FFF5E8" stroke="#F2D8A7"/>
  <text x="844" y="756" fill="#A46812" font-family="Arial, sans-serif" font-size="13" font-weight="700">In Review</text>

  <rect x="988" y="132" width="420" height="788" rx="28" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="1020" y="176" fill="#2D2A72" font-family="Arial, sans-serif" font-size="24" font-weight="700">Narrative Intelligence</text>
  <text x="1020" y="200" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="14">AI converts section feedback into structured signals, patterns, and actions.</text>

  <rect x="1020" y="228" width="356" height="120" rx="20" fill="#F7F6FF" stroke="#D9D4FF"/>
  <text x="1042" y="260" fill="#5B55C8" font-family="Arial, sans-serif" font-size="12" font-weight="700">TOP ISSUES</text>
  <text x="1042" y="292" fill="#2D2A72" font-family="Arial, sans-serif" font-size="15" font-weight="700">1. Differentiation is the weakest recurring signal</text>
  <text x="1042" y="318" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">Pattern appears across Positioning and Value Proposition.</text>

  <rect x="1020" y="366" width="356" height="202" rx="20" fill="#F7F6FF" stroke="#D9D4FF"/>
  <text x="1042" y="398" fill="#5B55C8" font-family="Arial, sans-serif" font-size="12" font-weight="700">AI SUGGESTIONS</text>
  <text x="1042" y="430" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14">• Strengthen the “why neem” angle in Positioning</text>
  <text x="1042" y="456" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14">• Add clearer contrast versus generic food-storage lids</text>
  <text x="1042" y="482" fill="#2D2A72" font-family="Arial, sans-serif" font-size="14">• Reframe value around freshness, hygiene, and premium guest experience</text>

  <rect x="1020" y="586" width="356" height="132" rx="20" fill="#F7F6FF" stroke="#D9D4FF"/>
  <text x="1042" y="618" fill="#5B55C8" font-family="Arial, sans-serif" font-size="12" font-weight="700">CONFIDENCE SCORE</text>
  <text x="1042" y="674" fill="#2D2A72" font-family="Arial, sans-serif" font-size="44" font-weight="700">68</text>
  <text x="1106" y="674" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="18" font-weight="700">/ 100</text>
  <text x="1042" y="700" fill="#6E6AA8" font-family="Arial, sans-serif" font-size="13">Weighted from clarity, relevance, and differentiation across all reviewed sections.</text>

  <rect x="1020" y="736" width="356" height="148" rx="20" fill="#FFFFFF" stroke="#D9D4FF"/>
  <text x="1042" y="768" fill="#5B55C8" font-family="Arial, sans-serif" font-size="12" font-weight="700">AI PIPELINE</text>
  <text x="1042" y="798" fill="#2D2A72" font-family="Arial, sans-serif" font-size="13">1. Normalize feedback by section</text>
  <text x="1042" y="822" fill="#2D2A72" font-family="Arial, sans-serif" font-size="13">2. Aggregate signals across sections</text>
  <text x="1042" y="846" fill="#2D2A72" font-family="Arial, sans-serif" font-size="13">3. Generate actionable suggestions</text>
  <text x="1042" y="870" fill="#2D2A72" font-family="Arial, sans-serif" font-size="13">4. Recalculate confidence score</text>
</svg>
