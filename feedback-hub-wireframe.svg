  <text x="544" y="261" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Relevance</text>
  <text x="694" y="261" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Differentiation</text>
  <text x="858" y="261" fill="#5B55C8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Status</text>

