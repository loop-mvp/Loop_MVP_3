  <text x="308" y="420" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#23206F">Problem</text>
  <text x="308" y="456" font-family="Arial, sans-serif" font-size="18" fill="#3B387F">Power users who read, watch, and work on phones lose momentum because</text>
  <text x="308" y="484" font-family="Arial, sans-serif" font-size="18" fill="#3B387F">screen space forces constant switching, cramped split views, and tradeoffs</text>
  <text x="308" y="512" font-family="Arial, sans-serif" font-size="18" fill="#3B387F">between portability and true multi-tasking.</text>
