  <text x="334" y="584" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#3670C9">Bullet context</text>
  <text x="308" y="630" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#23206F">Solution</text>
  <circle cx="322" cy="664" r="5" fill="#5B51D8"/>
  <circle cx="322" cy="692" r="5" fill="#5B51D8"/>
  <text x="338" y="670" font-family="Arial, sans-serif" font-size="17" fill="#514E96">Three-screen foldable design with continuity across panels</text>
  <text x="338" y="698" font-family="Arial, sans-serif" font-size="17" fill="#514E96">Tablet-like canvas without sacrificing pocketability</text>

  <rect x="744" y="538" width="432" height="172" rx="28" fill="#FBFAFF" stroke="#D9D1FF"/>
  <rect x="768" y="562" width="146" height="34" rx="12" fill="#EDF6FF"/>
  <text x="794" y="584" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#3670C9">Bullet context</text>
  <text x="768" y="630" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#23206F">Primary Audience</text>
  <circle cx="782" cy="664" r="5" fill="#5B51D8"/>
  <circle cx="782" cy="692" r="5" fill="#5B51D8"/>
  <text x="798" y="670" font-family="Arial, sans-serif" font-size="17" fill="#514E96">Tech-forward professionals who multi-task on the go</text>
  <text x="798" y="698" font-family="Arial, sans-serif" font-size="17" fill="#514E96">Media-heavy users wanting one device for work and leisure</text>

  <rect x="284" y="736" width="892" height="176" rx="28" fill="#FFFFFF" stroke="#E4DEFF" stroke-dasharray="8 10"/>
  <rect x="308" y="760" width="146" height="34" rx="12" fill="#F8F7FF"/>
  <text x="336" y="782" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7B78B5">Ghost guidance</text>
  <text x="308" y="828" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#23206F">Differentiation</text>
  <text x="308" y="864" font-family="Arial, sans-serif" font-size="18" fill="#9A97C6">What makes this meaningfully better than large phones, tablets, and other foldables?</text>
  <text x="308" y="892" font-family="Arial, sans-serif" font-size="18" fill="#9A97C6">Focus on one contrast the buyer will remember.</text>

