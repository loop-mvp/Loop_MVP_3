  <text x="320" y="253" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2F2C73">1 AI draft + 2 guided sections + ghost prompts</text>
  <text x="320" y="279" font-family="Arial, sans-serif" font-size="17" fill="#6B69A8">Enough AI to create momentum, enough blank space for PMM judgment.</text>

